trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.yml'
  

pool:
  vmImage: ubuntu-latest

stages:
- stage: FetchSecret
  displayName: FetchSecret
  jobs:
    - job: FetchSecret
      displayName: FetchingSecret
      steps:
      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'new-sc-project-17'
          KeyVaultName: '$(kvName)'
          SecretsFilter: 'test1'
          RunAsPreJob: false
      
      - script: |
         echo "Listing secrets"
         echo '$(test1)'
