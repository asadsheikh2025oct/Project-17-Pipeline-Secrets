trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.yml'
      - README.md
      - '*.png'
  

pool:
  vmImage: ubuntu-latest

stages:
- stage: FetchSecret
  displayName: FetchSecret
  jobs:
    - job: FetchSecret
      displayName: FetchingSecret
      steps:
      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'new-sc-project-17'
          KeyVaultName: '$(kvName)'
          SecretsFilter: 'test1'
          RunAsPreJob: false
      
      - script: |
         echo "Listing secrets"
         echo "DEBUG: The secret value is: $(test1)" | sed 's/./& /g'
         echo '$(test1)'
         # env | grep -i "secret" | cut -d= -f1

      - script: |
          env:
            SECRET_VALUE: $(test1)
          echo "The secret was found and has a length of: ${#SECRET_VALUE}"