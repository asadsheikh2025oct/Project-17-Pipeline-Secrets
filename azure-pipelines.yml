trigger: 
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - '*.png'
      - azure-pipelines.yml

pool:
  vmImage: 'ubuntu-latest'


stages:
- stage: Validate
  jobs:
  - job: ValidationJob
    steps:
    - task: AzureCLI@2
      displayName: 'Bicep Linting'
      inputs:
        azureSubscription: 'new-sc-project-17'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: 'az bicep build --file main.bicep'

    - task: AzureCLI@2
      inputs:
        azureSubscription: 'new-sc-project-17'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az deployment group what-if \
            --resource-group $(resourceGroup) \
            --template-file main.bicep \
            --parameters location=$(location)

- stage: Deploy
  displayName: Deployment
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - deployment: DeployKV
      environment: 'Production-Environment'
      strategy:
        runOnce:
          deploy:
            pool:
              vmImage: 'ubuntu-latest'
            steps:
            - checkout: self
            - task: AzureResourceManagerTemplateDeployment@3
              displayName: 'Vault Deployment Step'
              inputs:
                deploymentScope: 'Resource Group'
                azureResourceManagerConnection: 'new-sc-project-17'
                subscriptionId: $(subscriptionId)
                action: 'Create Or Update Resource Group'
                resourceGroupName: $(resourceGroup)
                location: $(location)
                templateLocation: 'Linked artifact'
                csmFile: 'main.bicep'
                deploymentMode: 'Incremental'

- stage: FetchSecret
  displayName: FetchSecret
  dependsOn: Deploy
  condition: succeeded()
  jobs:
    - job: FetchSecret
      displayName: FetchingSecret
      steps:
      - task: AzureKeyVault@2
        inputs:
          azureSubscription: 'new-sc-project-17'
          KeyVaultName: $(kvName)
          SecretsFilter: 'testsecret2'
          RunAsPreJob: false

      - script: |
         echo "Listing secrets"
         env | grep -i "secret" | cut -d= -f1